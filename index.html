<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWC 2026 Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header hide-print">
        <div class="header-main">
            <h1>FWC 2026</h1>
            <div class="header-controls">
                <button id="btn-mode" class="brutal-btn mode-add">➕ Sumar</button>
                <button id="btn-export" class="brutal-btn">PDF Faltantes</button>
            </div>
        </div>
        
        <div class="progress-container">
            <div class="progress-text">Progreso: <span id="progress-percentage">0%</span> (<span id="progress-count">0/0</span>)</div>
            <div class="progress-bar-bg">
                <div id="progress-bar-fill" class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" class="brutal-input" placeholder="🔍 Buscar lámina (ej: MEX01, Messi...)">
        </div>

        <nav id="nav-groups" class="scroll-nav"></nav>
    </header>

    <main id="app-main" class="hide-print">
        <div id="dashboard" class="dashboard-grid"></div>
        </main>

    <div id="print-view" class="print-only">
        <h2>Láminas Faltantes - FWC 2026</h2>
        <div id="print-content"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
